name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0 or 1.0.0-beta.1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release (beta)'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
      is_prerelease: ${{ steps.get-version.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRE="${{ github.event.inputs.prerelease }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Auto-detect prerelease from tag (e.g., v1.0.0-beta.1)
            if [[ "$VERSION" == *"-"* ]]; then
              IS_PRE="true"
            else
              IS_PRE="false"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRE" >> $GITHUB_OUTPUT

      - name: Generate release notes from changelog
        id: release-notes
        run: |
          node scripts/build-changelog-json.cjs
          notes=$(node scripts/get-latest-release-notes.cjs --version "${{ steps.get-version.outputs.version }}")
          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        env:
          RELEASE_BODY: ${{ steps.release-notes.outputs.body }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `MoonSnap v${{ steps.get-version.outputs.version }}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: ${{ steps.get-version.outputs.is_prerelease == 'true' }}
            })
            return data.id

      - name: Build changelog asset
        run: node scripts/build-changelog-json.cjs

      - name: Upload changelog asset
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ steps.create-release.outputs.result }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseId = Number(process.env.RELEASE_ID);
            const assetName = 'changelog.generated.json';
            const assetPath = path.join(process.env.GITHUB_WORKSPACE, 'packages', 'changelog', 'src', assetName);
            const content = fs.readFileSync(assetPath);

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            });

            for (const existingAsset of release.assets || []) {
              if (existingAsset.name === assetName) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existingAsset.id
                });
              }
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: assetName,
              data: content
            });

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Cache FFmpeg
        if: matrix.platform == 'windows-latest'
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: C:\ffmpeg
          key: ffmpeg-windows-7.1

      - name: Download FFmpeg
        if: matrix.platform == 'windows-latest' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ffmpegVersion = "7.1"
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/$ffmpegVersion/ffmpeg-$ffmpegVersion-full_build-shared.zip"
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"

          Write-Host "Downloading FFmpeg $ffmpegVersion..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extract" -Force

          $ffmpegPath = Get-ChildItem -Path "$env:RUNNER_TEMP\ffmpeg-extract" -Directory | Select-Object -First 1
          Move-Item -Path $ffmpegPath.FullName -Destination "C:\ffmpeg" -Force

      - name: Set FFmpeg env and copy DLLs
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          echo "FFMPEG_DIR=C:\ffmpeg" >> $env:GITHUB_ENV
          echo "C:\ffmpeg\bin" >> $env:GITHUB_PATH

          # Copy FFmpeg DLLs to binaries folder for bundling
          Write-Host "Copying FFmpeg DLLs for bundling..."
          $binariesDir = "apps\desktop\src-tauri\binaries"
          if (!(Test-Path $binariesDir)) { New-Item -ItemType Directory -Path $binariesDir -Force }
          Copy-Item "C:\ffmpeg\bin\*.dll" -Destination $binariesDir -Force
          Get-ChildItem $binariesDir -Filter "*.dll" | ForEach-Object { Write-Host "  - $($_.Name)" }

      - name: Cache LLVM
        if: matrix.platform == 'windows-latest'
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\LLVM
          key: llvm-windows-latest

      - name: Install LLVM
        if: matrix.platform == 'windows-latest' && steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install llvm -y

      - name: Set LLVM env
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: apps/desktop
          args: ${{ matrix.args }}

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: ${{ needs.create-release.outputs.is_prerelease == 'true' }}
            })

  # Mirror release to public repo for downloads (skip for prereleases)
  mirror-to-public:
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri, publish-release]
    if: needs.create-release.outputs.is_prerelease != 'true'
    env:
      PUBLIC_REPO: walterlow/moonsnap-releases
      VERSION: ${{ needs.create-release.outputs.version }}

    steps:
      - name: Download release assets
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get release assets from private repo
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }}
            });

            // Create assets directory
            fs.mkdirSync('assets', { recursive: true });

            // Download each asset
            for (const asset of release.assets) {
              console.log(`Downloading ${asset.name}...`);
              const { data } = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { Accept: 'application/octet-stream' }
              });
              fs.writeFileSync(path.join('assets', asset.name), Buffer.from(data));
            }

      - name: Rewrite latest.json URLs for public repo
        env:
          PRIVATE_REPO: ${{ github.repository }}
        run: |
          if [ -f assets/latest.json ]; then
            echo "Rewriting URLs in latest.json..."
            echo "Before:"
            cat assets/latest.json
            # Replace private repo URLs with public repo URLs
            sed -i "s|github.com/${PRIVATE_REPO}/releases|github.com/${PUBLIC_REPO}/releases|g" assets/latest.json
            echo "After:"
            cat assets/latest.json
          fi

      - name: Create release on public repo
        uses: actions/github-script@v8
        env:
          RELEASES_PAT: ${{ secrets.RELEASES_PAT }}
        with:
          github-token: ${{ secrets.RELEASES_PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const [owner, repo] = process.env.PUBLIC_REPO.split('/');
            const version = process.env.VERSION;

            // Check if release already exists
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: `v${version}`
              });
              release = data;
              console.log(`Release v${version} already exists, updating...`);
            } catch (e) {
              // Create new release
              const { data } = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: `v${version}`,
                name: `MoonSnap v${version}`,
                body: `## Download\n\nDownload the installer for your platform below.\n\n**Windows:** Download the \`.exe\` installer.\n\n---\n\n[View changelog](https://github.com/${owner}/${repo}/releases)`,
                draft: false,
                prerelease: false
              });
              release = data;
              console.log(`Created release v${version}`);
            }

            // Upload assets
            const assetsDir = 'assets';
            const files = fs.readdirSync(assetsDir);

            for (const file of files) {
              const filePath = path.join(assetsDir, file);
              const content = fs.readFileSync(filePath);

              console.log(`Uploading ${file}...`);

              // Delete existing asset if it exists
              for (const existingAsset of release.assets || []) {
                if (existingAsset.name === file) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner,
                    repo,
                    asset_id: existingAsset.id
                  });
                }
              }

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: file,
                data: content
              });
            }

            console.log('✅ Release mirrored to public repo!')
