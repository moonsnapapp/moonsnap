name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/desktop/src/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - 'apps/desktop/package.json'
              - 'apps/desktop/tsconfig*.json'
              - 'apps/desktop/vite.config.*'
            rust:
              - 'apps/desktop/src-tauri/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
            ci:
              - '.github/workflows/ci.yml'

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: bun install

      # Frontend checks via Turbo
      - name: TypeScript type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test:run

      - name: Enforce critical desktop coverage
        run: cd apps/desktop && bun run test:coverage:critical

      # Rust checks
      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

  rust-crate-contracts:
    name: Rust Crate Contracts (${{ matrix.crate }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - snapit-core
          - snapit-domain
          - snapit-media
          - snapit-render
          - snapit-capture
          - snapit-export

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Test shared crate contract
        run: cargo test -p ${{ matrix.crate }} --lib --manifest-path apps/desktop/src-tauri/Cargo.toml

  rust-desktop-full-checks:
    name: Rust Desktop Full Checks
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install FFmpeg + LLVM (Windows)
        shell: pwsh
        run: |
          $ffmpegVersion = "7.1"
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/$ffmpegVersion/ffmpeg-$ffmpegVersion-full_build-shared.zip"
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $ffmpegDir = "$env:RUNNER_TEMP\ffmpeg"

          Write-Host "Downloading FFmpeg $ffmpegVersion..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegDir -Force

          $ffmpegPath = Get-ChildItem -Path $ffmpegDir -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$($ffmpegPath.FullName)" >> $env:GITHUB_ENV
          echo "$($ffmpegPath.FullName)\bin" >> $env:GITHUB_PATH

          # ffmpeg-sys-next bindgen requires libclang
          choco install llvm -y
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Clippy (desktop tauri crate)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

      - name: Rust lib tests (desktop tauri crate)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib

  build-web:
    name: Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run --filter=@snapit/web build
