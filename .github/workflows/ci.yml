name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  check:
    name: Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: bun install

      # Frontend checks via Turbo
      - name: TypeScript type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test:run

      # Rust checks
      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      # Note: clippy skipped - requires FFmpeg libs which aren't available on CI
      # Run locally with: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

      # Note: Type generation check skipped - requires FFmpeg libs for build
      # Run locally: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib
      # Then verify: git diff --exit-code apps/desktop/src/types/generated/

  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run --filter=@snapit/web build
