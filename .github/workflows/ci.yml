name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]

env:
  CARGO_TERM_COLOR: always
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/desktop/src/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - 'apps/desktop/package.json'
              - 'apps/desktop/tsconfig*.json'
              - 'apps/desktop/vite.config.*'
            rust:
              - 'apps/desktop/src-tauri/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
            ci:
              - '.github/workflows/ci.yml'

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install dependencies
        run: bun install

      # Frontend checks via Turbo
      - name: TypeScript type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test:run

      - name: Enforce critical desktop coverage
        run: cd apps/desktop && bun run test:coverage:critical

      # Rust checks
      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

  rust-crate-contracts:
    name: Rust Crate Contracts (${{ matrix.crate }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - moonsnap-core
          - moonsnap-domain
          - moonsnap-media
          - moonsnap-render

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Test shared crate contract
        run: cargo test -p ${{ matrix.crate }} --lib --manifest-path apps/desktop/src-tauri/Cargo.toml

  rust-crate-contracts-windows:
    name: Rust Crate Contracts (${{ matrix.crate }})
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - moonsnap-capture
          - moonsnap-export

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Test shared crate contract
        run: cargo test -p ${{ matrix.crate }} --lib --manifest-path apps/desktop/src-tauri/Cargo.toml

  rust-desktop-full-checks:
    name: Rust Desktop Full Checks
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'
          prefix-key: 'v2'

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: C:\ffmpeg
          key: ffmpeg-windows-7.1

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ffmpegVersion = "7.1"
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/$ffmpegVersion/ffmpeg-$ffmpegVersion-full_build-shared.zip"
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"

          Write-Host "Downloading FFmpeg $ffmpegVersion..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extract" -Force

          $ffmpegPath = Get-ChildItem -Path "$env:RUNNER_TEMP\ffmpeg-extract" -Directory | Select-Object -First 1
          Move-Item -Path $ffmpegPath.FullName -Destination "C:\ffmpeg" -Force

      - name: Set FFmpeg env
        shell: pwsh
        run: |
          echo "FFMPEG_DIR=C:\ffmpeg" >> $env:GITHUB_ENV
          echo "C:\ffmpeg\bin" >> $env:GITHUB_PATH

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\LLVM
          key: llvm-windows-latest

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install llvm -y

      - name: Set LLVM env and use lld linker
        shell: pwsh
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=lld-link" >> $env:GITHUB_ENV

      - name: Clippy (desktop tauri crate)
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

      - name: Rust lib tests (desktop tauri crate)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Rust security audit
        run: cargo audit --file apps/desktop/src-tauri/Cargo.lock --ignore RUSTSEC-2026-0002

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: NPM security audit
        run: bun audit || true

  build-smoke-test:
    name: Build Smoke Test (Windows)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: C:\ffmpeg
          key: ffmpeg-windows-7.1

      - name: Download FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ffmpegVersion = "7.1"
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/$ffmpegVersion/ffmpeg-$ffmpegVersion-full_build-shared.zip"
          $ffmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"

          Write-Host "Downloading FFmpeg $ffmpegVersion..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extract" -Force

          $ffmpegPath = Get-ChildItem -Path "$env:RUNNER_TEMP\ffmpeg-extract" -Directory | Select-Object -First 1
          Move-Item -Path $ffmpegPath.FullName -Destination "C:\ffmpeg" -Force

      - name: Set FFmpeg env
        shell: pwsh
        run: |
          echo "FFMPEG_DIR=C:\ffmpeg" >> $env:GITHUB_ENV
          echo "C:\ffmpeg\bin" >> $env:GITHUB_PATH

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\LLVM
          key: llvm-windows-latest

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install llvm -y

      - name: Set LLVM env and use lld linker
        shell: pwsh
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=lld-link" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: cd apps/desktop && bun run build

      - name: Cargo build check (debug)
        run: cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-web:
    name: Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web app
        run: bun run --filter=@moonsnap/web build
